services:
  postgres:
    image: postgres:15-alpine
    container_name: barberos-db
    restart: always
    environment:
      POSTGRES_USER: barberos
      POSTGRES_PASSWORD: barberos123
      POSTGRES_DB: barberos
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U barberos"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4
    container_name: barberos-pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@barberos.com
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "5050:80"
    depends_on:
      - postgres

volumes:
  postgres_data:
